name: Build Extensions & Mihon Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Generate Signing Keystore and Extract Fingerprint
        run: |
          keytool -genkey -v -keystore release.keystore -alias mihonkey -keyalg RSA -keysize 2048 -validity 10000 -storepass mihonextensionpassword -keypass mihonextensionpassword -dname "CN=Mihon, OU=Extension, O=Mihon, L=City, S=State, C=US"
          RAW_FINGERPRINT=$(keytool -exportcert -alias mihonkey -keystore release.keystore -storepass mihonextensionpassword | sha256sum | awk '{print $1}')
          echo "SIGNING_FINGERPRINT=$RAW_FINGERPRINT" >> $GITHUB_ENV
          echo "Generated Key Fingerprint: $RAW_FINGERPRINT"

      - name: Build APKs
        run: |
          gradle assembleDebug

      - name: Collect APKs, Sign with v2/v3 Scheme and Generate Repo Index
        run: |
          mkdir -p repo
          find src/all/ybxmanga/build/outputs/apk/ -name "*.apk" -exec cp {} repo/tachiyomi-all.ybxmanga-v1.0.0.apk \; || true
          cp repo/tachiyomi-all.ybxmanga-v1.0.0.apk ./tachiyomi-all.ybxmanga-v1.0.0.apk || true
          
          # Locate apksigner in Android SDK
          APKSIGNER=$(find $ANDROID_HOME/build-tools/ -name "apksigner" | sort -V | tail -n 1)
          echo "Using apksigner at: $APKSIGNER"
          
          # Sign APK with v2/v3 scheme
          $APKSIGNER sign --ks release.keystore --ks-key-alias mihonkey --ks-pass pass:mihonextensionpassword --key-pass pass:mihonextensionpassword repo/tachiyomi-all.ybxmanga-v1.0.0.apk
          $APKSIGNER sign --ks release.keystore --ks-key-alias mihonkey --ks-pass pass:mihonextensionpassword --key-pass pass:mihonextensionpassword ./tachiyomi-all.ybxmanga-v1.0.0.apk
          
          python3 scripts/generate_repo.py

      - name: Commit and Push to repo branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b repo || git checkout repo
          git add -A
          git commit -m "Auto-build signed extension APK with v2/v3 scheme [skip ci]" || true
          git push origin repo --force

      - name: Sync updated files back to main branch
        run: |
          git checkout main
          git add index.min.json index.min.json.gz repo.json tachiyomi-all.ybxmanga-v1.0.0.apk
          git commit -m "Sync compiled APK and repo index to main [skip ci]" || true
          git push origin main
