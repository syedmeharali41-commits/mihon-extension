name: Build Extensions & Mihon Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build APKs
        run: |
          gradle assembleDebug

      - name: Collect APKs and Generate Repo Index
        run: |
          mkdir -p repo
          find src/ -name "*.apk" -exec cp {} repo/tachiyomi-all.ybxmanga-v1.0.0.apk \; || true
          cp repo/tachiyomi-all.ybxmanga-v1.0.0.apk ./tachiyomi-all.ybxmanga-v1.0.0.apk || true
          python3 scripts/generate_repo.py

      - name: Commit and Push to repo branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b repo || git checkout repo
          git add -A
          git commit -m "Auto-build compiled extension APK and repo index [skip ci]" || true
          git push origin repo --force
